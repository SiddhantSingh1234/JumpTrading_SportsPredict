name: Quick Refresh and Predict Phase

on:
  schedule:
    # Change this cron expression to configure how often the predict check runs
    - cron: '*/30 * * * *' # Every 30 minutes
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create Firebase Key JSON
        run: echo '${{ secrets.FIREBASE_CREDENTIALS }}' > firebase-credentials.json

      - name: Run Prediction Pipeline
        env:
          SPORTSPREDICT_BOT1_KEY: ${{ secrets.SPORTSPREDICT_BOT1_KEY }}
          SPORTSPREDICT_BOT2_KEY: ${{ secrets.SPORTSPREDICT_BOT2_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          FIREBASE_CREDENTIALS_PATH: ./firebase-credentials.json
          # Configurable prediction window matching the cron schedule (15) + buffer (5)
          PREDICT_WINDOW_MINUTES: "30"
          PREDICT_WINDOW_BUFFER: "10"
        run: python src/main.py predict


